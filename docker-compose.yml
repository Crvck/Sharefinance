version: "3.9"

services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: sharedfinance-auth-service
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${AUTH_DJANGO_SETTINGS_MODULE:-config.settings}
      SQLITE_PATH: ${AUTH_SQLITE_PATH:-/app/data/db.sqlite3}
      SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-auth-secret}
      DEBUG: ${AUTH_DEBUG:-1}
    ports:
      - "8001:8000"
    volumes:
      - ./auth-service:/app

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: sharedfinance-finance-service
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${FINANCE_DJANGO_SETTINGS_MODULE:-config.settings}
      SQLITE_PATH: ${FINANCE_SQLITE_PATH:-/app/data/db.sqlite3}
      SECRET_KEY: ${FINANCE_SECRET_KEY:-change-me-finance-secret}
      DEBUG: ${FINANCE_DEBUG:-1}
    ports:
      - "8002:8000"
    volumes:
      - ./finance-service:/app

  nanobot-service:
    build:
      context: ./nanobot-service
      dockerfile: Dockerfile
    container_name: sharedfinance-nanobot-service
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Mexico_City}
      FINANCE_BOT_TRANSACTION_URL: ${FINANCE_BOT_TRANSACTION_URL:-http://finance-service:8000/api/bot/transaction/}
      FINANCE_BOT_BALANCE_URL: ${FINANCE_BOT_BALANCE_URL:-http://finance-service:8000/api/bot/balance/}
      FINANCE_BOT_TIMEOUT_SECONDS: ${FINANCE_BOT_TIMEOUT_SECONDS:-10}
    volumes:
      - ./nanobot-service/data:/data/nanobot
      - ./nanobot-service/skills:/data/nanobot/custom_skills
    ports:
      - "18790:18790"
    depends_on:
      - finance-service

  mobile-service:
    build:
      context: ./sharedfinance-mobile
      dockerfile: Dockerfile
    container_name: sharedfinance-mobile-service
    restart: unless-stopped
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-192.168.68.50}
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "8081:8081"
    volumes:
      - ./sharedfinance-mobile:/app
      - sharedfinance-mobile-node_modules:/app/node_modules
    depends_on:
      - auth-service
      - finance-service

volumes:
  sharedfinance-mobile-node_modules:
